name: Update Live Scores
on:
  schedule:
    # Every 5 minutes from 5 PM to midnight MT (23:00 - 06:00 UTC)
    - cron: '*/5 23 * * *'
    - cron: '*/5 0-6 * * *'
  workflow_dispatch:

jobs:
  update-scores:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pytz

      - name: Fetch live scores
        run: python .github/scripts/update_scores.py

      - name: Commit scores
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scores.json
          git diff --staged --quiet || git commit -m "Update scores $(date -u '+%H:%M')"
          git push
