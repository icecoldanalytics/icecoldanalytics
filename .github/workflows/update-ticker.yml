name: Update Ticker Data
on:
  schedule:
    - cron: '0 14 * * *'  # 7 AM MST
  workflow_dispatch:

jobs:
  update-ticker:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pytz

      - name: Generate ticker data
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python .github/scripts/update_ticker.py

      - name: Commit ticker data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ticker.json
          git diff --staged --quiet || git commit -m "Update ticker data $(date -u '+%Y-%m-%d')"
          git push
